name: Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    name: Build & push
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      packages: write

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Format: YYYY.MM.DD.HHmm  (UTC, zero-padded, sortable)
      - name: Generate version
        id: version
        run: |
          VERSION=$(date -u +"%Y.%m.%d.%H%M")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Generated version: $VERSION"

      # ── Bump package.json ────────────────────────────────────────────────────
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Write version to package.json
        run: |
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.value }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 4) + '\n');
          "

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.value }} [skip ci]"
          git push

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image list
        id: images
        run: |
          IMAGES="ghcr.io/${{ github.repository_owner }}/sse-postgres-server"
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            IMAGES="$IMAGES
          ${DOCKERHUB_USERNAME}/sse-postgres-server"
          fi
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$IMAGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value={{ date 'YYYY.MM.DD' tz='UTC' }}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Published :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** \`${{ steps.version.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ghcr.io/${{ github.repository_owner }}/sse-postgres-server:${{ steps.version.outputs.value }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
